<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mac Dashboard</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mac Dashboard">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>(function(){var u=new URLSearchParams(location.search).get('theme');
  var p=(u==='light'||u==='dark')?u:(localStorage.getItem('sysdash-theme')||'auto');
  var d=(p==='light'||p==='dark')?p:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.dataset.theme=d;})();</script>
<style>
  :root{
    --bg:#0a0e14; --panel:#131822; --panel2:#1a212e; --line:#222b3a;
    --txt:#ccd6e2; --muted:#8493a8; --accent:#4f8cff;
    --green:#2ecc71; --amber:#f5a623; --red:#ff5c5c; --gray:#56627a;
    --track:#0d1320;
    --bggrad:radial-gradient(1200px 700px at 80% -10%,#16203a 0%,#0a0e14 55%);
    --shadow:0 10px 30px rgba(0,0,0,.25);
    --pill-idle-fg:#bcd3ff; --pill-idle-bg:rgba(79,140,255,.15); --pill-idle-bd:rgba(79,140,255,.4);
    --pill-busy-fg:#aee9c8; --pill-busy-bg:rgba(46,204,113,.15); --pill-busy-bd:rgba(46,204,113,.4);
    --pill-off-fg:#c2cad8; --pill-off-bg:rgba(120,135,160,.16); --pill-off-bd:rgba(120,135,160,.4);
  }
  :root[data-theme="light"]{
    --bg:#eef2f8; --panel:#ffffff; --panel2:#f6f9fd; --line:#e1e8f1;
    --txt:#16202e; --muted:#5a6678; --accent:#2f6bf0;
    --green:#149a4c; --amber:#c8810b; --red:#df3b3b; --gray:#7a879d;
    --track:#e6ecf4;
    --bggrad:radial-gradient(1200px 700px at 80% -10%,#dbe7ff 0%,#eef2f8 55%);
    --shadow:0 8px 24px rgba(40,60,100,.10);
    --pill-idle-fg:#1948b3; --pill-idle-bg:rgba(47,107,240,.12); --pill-idle-bd:rgba(47,107,240,.45);
    --pill-busy-fg:#0a7a3a; --pill-busy-bg:rgba(20,154,76,.13); --pill-busy-bd:rgba(20,154,76,.45);
    --pill-off-fg:#52607a; --pill-off-bg:rgba(90,102,120,.12); --pill-off-bd:rgba(90,102,120,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bggrad);
    color:var(--txt);font:14px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif;
    min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
  }
  .wrap{max-width:1680px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px}
  .hl{display:flex;align-items:center;gap:14px}
  .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#4f8cff,#9b5cff);
    display:grid;place-items:center;font-size:22px;box-shadow:0 6px 20px rgba(79,140,255,.35);flex:0 0 auto}
  h1{font-size:18px;font-weight:650;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .right{display:flex;align-items:center;gap:10px}
  .iconbtn{cursor:pointer;height:42px;min-width:42px;padding:0 12px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);font-size:16px;display:grid;place-items:center;
    transition:transform .15s,background .3s,border-color .3s;box-shadow:var(--shadow);flex:0 0 auto}
  .iconbtn:hover{transform:translateY(-1px)}
  .iconbtn:active{transform:scale(.94)}
  .iconbtn.active{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 14px rgba(79,140,255,.45)}
  .clock{text-align:right}
  .clock .t{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums}
  .clock .live{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:2px}
  .dotlive{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

  .hostbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);font-size:12.5px;color:var(--muted)}
  .chip b{color:var(--txt);font-weight:600}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:700;padding:0 2px}
  .chip .x:hover{color:var(--red)}

  .banner{display:none;align-items:center;gap:10px;background:rgba(255,92,92,.13);
    border:1px solid rgba(255,92,92,.5);color:var(--red);padding:12px 16px;border-radius:14px;
    margin-bottom:16px;font-weight:650;font-size:14px;animation:pulse 1.8s infinite}

  /* fit as many machines side by side as the width allows, then wrap down */
  .machines{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:18px;align-items:start}
  /* cap a panel's content width so a lone machine doesn't stretch awkwardly */
  .machine{max-width:760px;width:100%;margin:0 auto}
  .machine{display:flex;flex-direction:column;gap:0}
  .mhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .mname{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
  .mname .ic{font-size:20px}
  .mright{display:flex;align-items:center;gap:10px}
  .mtime{font-variant-numeric:tabular-nums;font-weight:600;color:var(--muted);font-size:13px;white-space:nowrap}
  .batt{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;white-space:nowrap;color:var(--muted)}
  .batt.low{color:var(--red)}
  .spark{width:100%;height:22px;margin-top:8px;opacity:.75;display:block}
  .moff{opacity:.6}
  .mhead[draggable]{cursor:grab} .mhead[draggable]:active{cursor:grabbing}
  .grip{color:var(--muted);opacity:.45;font-size:14px;margin-right:2px}
  .machine.dragover{outline:2px dashed var(--accent);outline-offset:5px;border-radius:18px}
  .section-title.collapsible{cursor:pointer;user-select:none}
  .section-title.collapsible:hover{color:var(--txt)}
  .chev{margin-left:8px;font-size:11px;color:var(--muted)}
  .histrow{display:flex;gap:5px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  .hdot{width:9px;height:9px;border-radius:3px;background:var(--gray)}
  .hdot.ok{background:var(--green)} .hdot.fail{background:var(--red)}
  .gauge.clickable{cursor:pointer} .gauge.clickable:hover{border-color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal[hidden]{display:none}
  .modal-card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:22px;max-width:760px;width:100%;box-shadow:var(--shadow)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-weight:650;font-size:15px}
  .mclose{cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .mclose:hover{color:var(--txt)}

  .grid{display:grid;gap:14px}
  .gauges{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:18px;padding:18px;box-shadow:var(--shadow);transition:background .3s,border-color .3s,transform .15s}
  .gauge{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px}
  .gauge .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:650;text-align:center}
  .ring{position:relative;width:128px;height:128px}
  .ring svg{transform:rotate(-90deg)}
  .ring .track{stroke:var(--track)}
  .ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
  .gmeta{color:var(--muted);font-size:12px;margin-top:4px;text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums}
  .gauge.crit{border-color:rgba(255,92,92,.6);box-shadow:0 0 0 1px rgba(255,92,92,.35),0 10px 30px rgba(255,92,92,.18)}
  .alert-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:10.5px;
    font-weight:800;padding:4px 8px;border-radius:999px;letter-spacing:.3px;
    box-shadow:0 2px 10px rgba(255,92,92,.5);animation:pulse 1.1s infinite;z-index:2}

  .section-title{display:flex;align-items:center;gap:8px;margin:22px 0 12px;font-size:12px;
    text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);font-weight:700}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .runners{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .runner{position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block}
  .runner.clickable{cursor:pointer}
  .runner.clickable:hover{transform:translateY(-2px);border-color:var(--accent)}
  .runner .row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .runner .name{font-weight:650;font-size:14.5px;display:flex;align-items:center;gap:6px}
  .runner .ext{color:var(--muted);font-size:13px;font-weight:400}
  .runner .repo{color:var(--muted);font-size:12px;margin-top:3px;word-break:break-all}
  .runner .up{color:var(--muted);font-size:12px;margin-top:12px;font-variant-numeric:tabular-nums}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
    font-size:12px;font-weight:700;border:1px solid transparent;flex:0 0 auto}
  .pill .d{width:9px;height:9px;border-radius:50%}
  .pill.busy{color:var(--pill-busy-fg);background:var(--pill-busy-bg);border-color:var(--pill-busy-bd)}
  .pill.busy .d{background:var(--green);animation:pulse 1.2s infinite}
  .pill.idle{color:var(--pill-idle-fg);background:var(--pill-idle-bg);border-color:var(--pill-idle-bd)}
  .pill.idle .d{background:var(--accent)}
  .pill.offline{color:var(--pill-off-fg);background:var(--pill-off-bg);border-color:var(--pill-off-bd)}
  .pill.offline .d{background:var(--gray)}
  .jobinfo{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:5px}
  .jline{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jmuted{color:var(--muted);font-style:italic}
  /* on hover, reveal everything that was truncated */
  .runner.clickable:hover .jline,.runner.clickable:hover .repo{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word}
  .rm-repo{color:var(--muted);font-size:13px;margin-bottom:12px}
  .rm-job{margin-bottom:14px}
  .rm-h{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin:6px 0 8px}
  .rm-run{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;text-decoration:none;color:inherit;border:1px solid transparent}
  .rm-run:hover{background:var(--track);border-color:var(--line)}
  .rm-run .rm-wf{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  .rm-run .rm-meta{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
  .rm-links{display:flex;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .rm-links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:13px}
  .runner.busy{border-color:var(--pill-busy-bd)}
  .runner.busy::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}

  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)}
  .kv .v{font-variant-numeric:tabular-nums;font-weight:650}
  .kv .v.crit{color:var(--red)}
  .bar{height:7px;border-radius:6px;background:var(--track);overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#4f8cff,#9b5cff);transition:width .5s}
  .proc{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px}
  .proc .pn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .proc .pm{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px}
  .cores{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
  .core{flex:1;min-width:12px;height:32px;background:var(--track);border-radius:4px;position:relative;overflow:hidden}
  .core>i{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#9b5cff,#4f8cff);transition:height .4s}
  .offline-card{color:var(--muted);text-align:center;padding:40px 18px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px}

  @media(max-width:520px){
    body{padding:14px}
    h1{font-size:16px}
    .clock .t{font-size:18px}
    .machines{grid-template-columns:1fr}
  }
  @keyframes pulse{0%{opacity:1}50%{opacity:.55}100%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hl">
      <div class="logo">💻</div>
      <div>
        <h1 id="title">Mac Dashboard</h1>
        <div class="sub" id="subtitle"></div>
      </div>
    </div>
    <div class="right">
      <button id="bellBtn" class="iconbtn" title="Notifications">🔕</button>
      <button id="langBtn" class="iconbtn" title="Language">🌐</button>
      <button id="themeBtn" class="iconbtn" title="Theme">🌓</button>
      <div class="clock">
        <div class="t" id="clock">--:--:--</div>
        <div class="live"><span class="dotlive"></span><span id="updated">live</span></div>
      </div>
    </div>
  </header>

  <div class="hostbar" id="hostbar"></div>
  <div class="banner" id="alertBanner"></div>
  <div class="machines" id="machines"></div>
  <div class="foot" id="foot"></div>
</div>

<div id="chartModal" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span id="chartTitle"></span><span id="chartClose" class="mclose">✕</span></div>
    <div id="chartBody"></div>
  </div>
</div>

<div id="runnerModal" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span id="runnerTitle"></span><span id="runnerClose" class="mclose">✕</span></div>
    <div id="runnerBody"></div>
  </div>
</div>

<script>
// ---------------- i18n ----------------
const T = {
  en: {
    sub:(ip,c)=>`Tailscale ${ip||'-'} · ${c} cores`,
    cpu:'CPU', mem:'Memory', diskUsed:'Disk · used',
    runners:'Runner status', system:'System',
    perCore:'CPU (per core)', load:'Load (1m / 5m / 15m)',
    ramUsed:'RAM (used)', swap:'Swap', diskFull:'Disk (used)', uptime:'Uptime',
    network:'Network', topMem:'Top memory processes',
    st:{busy:'running', idle:'idle', offline:'stopped'},
    notRunning:'not running', up:'up: ', noRunners:'No runners found',
    live:'live', noConn:'no connection',
    highUse:'High usage:', refresh:'refreshes every 1s',
    online:'online', offline:'offline', unreachable:'unreachable',
    addMachine:'＋ machine', addUrl:'Machine address (IP or URL) — e.g. 100.121.169.10',
    themeNames:{auto:'system', light:'light', dark:'dark'},
    langName:'Language', dunit:{d:'d', h:'h', m:'m'},
  },
  tr: {
    sub:(ip,c)=>`Tailscale ${ip||'-'} · ${c} çekirdek`,
    cpu:'CPU', mem:'Bellek', diskUsed:'Disk · dolu',
    runners:'Runner durumu', system:'Sistem',
    perCore:'CPU (her çekirdek)', load:'Load (1m / 5m / 15m)',
    ramUsed:'RAM (dolu)', swap:'Swap', diskFull:'Disk (dolu)', uptime:'Açık kalma',
    network:'Ağ', topMem:'En çok bellek kullanan süreçler',
    st:{busy:'çalışıyor', idle:'boşta', offline:'durdu'},
    notRunning:'çalışmıyor', up:'açık: ', noRunners:'Runner bulunamadı',
    live:'canlı', noConn:'bağlantı yok',
    highUse:'Yüksek kullanım:', refresh:'her 1 sn yenilenir',
    online:'çevrimiçi', offline:'çevrimdışı', unreachable:'ulaşılamıyor',
    addMachine:'＋ makine', addUrl:'Makine adresi (IP veya URL) — örn. 100.121.169.10',
    themeNames:{auto:'sistem', light:'açık', dark:'koyu'},
    langName:'Dil', dunit:{d:'g', h:'s', m:'d'},
  },
};
const LKEY='sysdash-lang';
function langPref(){return localStorage.getItem(LKEY)||'auto'}
function resolveLang(){
  const p=langPref();
  if(p==='en'||p==='tr')return p;
  return (navigator.language||'en').toLowerCase().startsWith('tr')?'tr':'en';
}
let L=resolveLang(), t=T[L];
const langBtn=document.getElementById('langBtn');
function applyLang(){
  L=resolveLang(); t=T[L];
  document.documentElement.lang=L;
  const p=langPref();
  langBtn.textContent = p==='auto'?'🌐':p.toUpperCase();
  langBtn.title=t.langName+': '+(p==='auto'?t.themeNames.auto:p);
}
langBtn.addEventListener('click',()=>{
  const order=['auto','en','tr'];
  localStorage.setItem(LKEY, order[(order.indexOf(langPref())+1)%3]);
  applyLang(); renderAll();
});

// ---------------- theme ----------------
const TKEY='sysdash-theme';
const tbtn=document.getElementById('themeBtn');
const mq=window.matchMedia('(prefers-color-scheme: dark)');
function themePref(){return localStorage.getItem(TKEY)||'auto'}
function applyTheme(){
  const u=new URLSearchParams(location.search).get('theme');
  const p=(u==='light'||u==='dark')?u:themePref();
  const resolved=p==='auto'?(mq.matches?'dark':'light'):p;
  document.documentElement.dataset.theme=resolved;
  tbtn.textContent = p==='auto'?'🌓':p==='light'?'☀️':'🌙';
  tbtn.title='Theme: '+t.themeNames[p];
}
tbtn.addEventListener('click',()=>{
  const order=['auto','light','dark'];
  localStorage.setItem(TKEY, order[(order.indexOf(themePref())+1)%3]);
  applyTheme();
});
mq.addEventListener('change',()=>{if(themePref()==='auto')applyTheme();});

// ---------------- hosts (multi-machine) ----------------
// host 0 is always "self" (served origin). Peers are stored in localStorage.
const HKEY='sysdash-hosts';
const DEFAULT_PEERS=[];  // start with just this Mac; add peers via "+ machine"
function normalizeBase(s){
  s=(s||'').trim().replace(/\/+$/,'');
  if(!s)return s;
  if(!/^https?:\/\//i.test(s)) s='http://'+s;
  // add the default port if the host has none
  if(!/^https?:\/\/[^/:]+:\d+/i.test(s)) s=s.replace(/^(https?:\/\/[^/:]+)/i,'$1:8765');
  return s;
}
function peers(){
  let raw=DEFAULT_PEERS;
  try{const v=JSON.parse(localStorage.getItem(HKEY)); if(Array.isArray(v))raw=v;}catch(e){}
  return raw.map(p=>({name:p.name, base:normalizeBase(p.base)}));
}
function setPeers(p){localStorage.setItem(HKEY, JSON.stringify(p));}
const lastData={};  // base -> {data, online}

// Demo mode (?demo) renders brandless sample data — used for screenshots/docs.
const DEMO_MODE=new URLSearchParams(location.search).has('demo');
const GiB=1073741824;
function demoHist(base,amp,seed){return Array.from({length:60},(_,i)=>Math.max(4,Math.min(97,base+amp*Math.sin((i+seed)/6.5)+(i%4)*1.2)));}
const DEMO_A={version:'1.0.0',host:'MacBook Pro',localtime:'09:41:07',tz:'+03',tailscale_ip:'100.x.y.z',
  uptime:25*86400+16*3600,cpu:{pct:42,cores:[68,55,40,33,28,22,18,14,11,9],count:10,load:[4.8,5.7,7.5]},
  mem:{pct:66,used:10.6*GiB,total:16*GiB},swap:{pct:31,used:6.2*GiB,total:20*GiB},
  disk:{pct:74,used:341*GiB,total:460*GiB},battery:{pct:84,plugged:true,secsleft:null},
  net:{up:120*1024,down:840*1024},hist:{cpu:demoHist(42,22,0),mem:demoHist(64,8,3)},
  runners:[{name:'ci-runner-1',repo:'acme/web-app',status:'busy',uptime:3600,url:'',dir:'',
      job:{branch:'feature/new-checkout',workflow:'build.yml',pr:128,pr_title:'Add new checkout flow',actor:'octocat',elapsed:192}},
    {name:'ci-runner-2',repo:'acme/api',status:'idle',uptime:4*86400,url:'',history:[{result:'Succeeded',dur:192,ago:600,workflow:'test.yml',branch:'main'},{result:'Succeeded',dur:205,ago:3600,workflow:'test.yml',branch:'main'},{result:'Failed',dur:88,ago:8000,workflow:'lint.yml',branch:'feature/api-v2'},{result:'Succeeded',dur:176,ago:12000,workflow:'test.yml',branch:'main'},{result:'Succeeded',dur:210,ago:20000,workflow:'deploy.yml',branch:'main'}]},

let autoPeers=[];  // tailnet peers discovered to be running sysdash
function hosts(){
  if(DEMO_MODE) return DEMO_HOSTS;
  const manual=peers(), mb=new Set(manual.map(p=>p.base));
  const list=[{name:'',base:'',self:true},...manual,
    ...autoPeers.filter(a=>!mb.has(a.base)).map(a=>({name:'',base:a.base,auto:true}))];
  return orderHosts(list);
}
function getOrder(){try{return JSON.parse(localStorage.getItem('sysdash-order'))||[]}catch(e){return []}}
function setOrder(b){localStorage.setItem('sysdash-order',JSON.stringify(b));}
function orderHosts(list){const ord=getOrder();const ix=b=>{const i=ord.indexOf(b);return i<0?1e6:i};
  return list.map((h,i)=>[h,i]).sort((a,b)=>(ix(a[0].base)-ix(b[0].base))||(a[1]-b[1])).map(x=>x[0]);}

function renderHostbar(){
  const hb=document.getElementById('hostbar');

    + `<button class="iconbtn" id="addHost" style="font-size:13px">${t.addMachine}</button>`;
  hb.querySelectorAll('.x').forEach(x=>x.onclick=()=>{
    const ps2=peers(); ps2.splice(+x.dataset.i,1); setPeers(ps2); renderHostbar(); renderAll();
  });

// ---------------- rendering ----------------
const WARN=75, CRIT=95, R=66, C=2*Math.PI*R;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function jobHTML(j){
  const p=[];
  if(j.pr) p.push(`<div class="jline" title="PR #${j.pr}${j.pr_title?' — '+esc(j.pr_title):''}">🔀 PR #${j.pr}${j.pr_title?' · '+esc(j.pr_title):''}</div>`);
  if(j.issue) p.push(`<div class="jline"># issue #${j.issue}</div>`);
  if(j.branch) p.push(`<div class="jline" title="${esc(j.branch)}${j.base?' → '+esc(j.base):''}">⎇ ${esc(j.branch)}${j.base?' → '+esc(j.base):''}</div>`);
  if(j.tag) p.push(`<div class="jline" title="${esc(j.tag)}">🏷 ${esc(j.tag)}</div>`);
  if(j.workflow) p.push(`<div class="jline" title="${esc(j.workflow)}">⚙ ${esc(j.workflow)}</div>`);
  if(j.actor) p.push(`<div class="jline jmuted">👤 ${esc(j.actor)}</div>`);
  if(j.commit) p.push(`<div class="jline jmuted" title="${esc(j.commit)}">“${esc(j.commit)}”</div>`);
  return p.length?`<div class="jobinfo">${p.join('')}</div>`:'';
}
function gb(b){return (b/1073741824).toFixed(1)+' GB'}
function rate(bps){if(bps==null)return '0';const u=['B','KB','MB','GB'];let i=0,v=bps;while(v>=1024&&i<u.length-1){v/=1024;i++}return (i?v.toFixed(1):v.toFixed(0))+' '+u[i]+'/s'}
function batteryChip(b){
  if(!b)return '';
  const low=!b.plugged&&b.pct<=20;
  let t='';
  if(b.secsleft){const h=Math.floor(b.secsleft/3600),m=Math.floor(b.secsleft%3600/60);t=' · '+(h?h+'s ':'')+m+'d';}
  return `<span class="batt ${low?'low':''}" title="${b.plugged?'şarjda':'pil'}${t}">🔋 ${b.pct}%${b.plugged?' ⚡':''}</span>`;
}
function sparkSVG(arr,col){
  if(!arr||arr.length<2)return '';
  const n=arr.length;
  const pts=arr.map((v,i)=>`${(i/(n-1)*100).toFixed(1)},${(23-(Math.max(0,Math.min(100,v))/100*21)).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 100 24" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>`;
}
function dur(s){if(s==null)return '—';const u=t.dunit;let d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
  if(d)return `${d}${u.d} ${h}${u.h}`; if(h)return `${h}${u.h} ${m}${u.m}`; return `${m}${u.m}`}
function ringHTML(label,pct,meta,spark,chart){
  const crit=pct>=CRIT, warn=pct>=WARN;
  const col=crit?'#ff5c5c':warn?'#f5a623':'#4f8cff';
  const off=C*(1-pct/100);
  return `<div class="card gauge ${crit?'crit':''} ${chart?'clickable':''}"${chart?` data-chart="${esc(chart)}"`:''}>
    ${crit?`<div class="alert-badge">⚠️ %${pct.toFixed(0)}</div>`:''}
    <div class="label">${label}</div>
    <div class="ring"><svg width="128" height="128" viewBox="0 0 150 150">
      <circle class="track" cx="75" cy="75" r="${R}" stroke-width="13" fill="none"/>
      <circle cx="75" cy="75" r="${R}" stroke="${col}" stroke-width="13" fill="none"
        stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
    </svg><div class="val"><div class="pct">${pct.toFixed(0)}<span style="font-size:14px">%</span></div></div></div>
    <div class="gmeta">${meta}</div>
    ${sparkSVG(spark,col)}
  </div>`;
}
// collapsible sections (global across machines)
function collapseState(){try{return JSON.parse(localStorage.getItem('sysdash-collapse'))||{}}catch(e){return {}}}
function isCollapsed(k){return !!collapseState()[k]}
function toggleCollapse(k){const s=collapseState();s[k]=!s[k];localStorage.setItem('sysdash-collapse',JSON.stringify(s));renderAll();}
function sec(key,title,inner){const c=isCollapsed(key);
  return `<div class="section-title collapsible" data-sec="${key}">${title}<span class="chev">${c?'▸':'▾'}</span></div>${c?'':inner}`;}
// recent job history dots
function historyHTML(h){
  if(!h||!h.length)return '';
  return `<div class="histrow">${h.map(j=>{const ok=(j.result||'').toLowerCase()==='succeeded';
    return `<span class="hdot ${j.result?(ok?'ok':'fail'):'unk'}" title="${j.result||'?'} · ${dur(j.dur)} · ${dur(j.ago)} ${L==='tr'?'önce':'ago'}"></span>`;}).join('')}</div>`;
}

function machineHTML(host, entry){
  const online = entry && entry.online;
  const s = online ? entry.data : null;
  const name = host.self ? (s?s.host:'Bu Mac') : (host.name || (s?s.host:host.base));
  let body;
  if(!online){
    body = `<div class="card offline-card">⚠️ ${t.unreachable}<br><span style="font-size:12px">${host.base||''}</span></div>`;
  } else {
    const kv=(label,pct,txt)=>`<div class="kv"><span class="k">${label}</span><span class="v ${pct>=CRIT?'crit':''}">${txt}</span></div>`;
    const runners = s.runners.length ? s.runners.map((r,ri)=>{
      return `<div class="card runner clickable ${r.status}" data-base="${esc(host.base)}" data-ri="${ri}" title="${L==='tr'?'detay için tıkla':'click for details'}">
        <div class="row1"><div class="name">${esc(r.name)}<span class="ext">▸</span></div>
          <span class="pill ${r.status}"><span class="d"></span>${t.st[r.status]}</span></div>
        <div class="repo">${esc(r.repo||'—')}</div>
        <div class="up">${r.status==='offline'?t.notRunning:t.up+dur(r.uptime)}</div>
        ${r.job?jobHTML(r.job):''}
        ${historyHTML(r.history)}
      </div>`;
    }).join('') : `<div class="card" style="color:var(--muted);grid-column:1/-1">${t.noRunners}</div>`;
    const maxr=Math.max(...s.top.map(p=>p.rss),1);
    const sysInner = `<div class="card">
        <div class="kv"><span class="k">${t.perCore}</span><span class="v">${s.cpu.pct.toFixed(0)}%</span></div>
        <div class="cores">${s.cpu.cores.map(c=>`<div class="core" title="${c}%"><i style="height:${c}%"></i></div>`).join('')}</div>
        <div class="kv" style="margin-top:12px"><span class="k">${t.load}</span><span class="v">${s.cpu.load.join('  /  ')}</span></div>
        ${s.net?`<div class="kv"><span class="k">${t.network}</span><span class="v">↓ ${rate(s.net.down)}　↑ ${rate(s.net.up)}</span></div>`:''}
        ${kv(t.ramUsed, s.mem.pct, gb(s.mem.used)+' / '+gb(s.mem.total)+' ('+s.mem.pct+'%)')}
        <div class="bar"><i style="width:${s.mem.pct}%"></i></div>
        <div style="height:10px"></div>
        ${kv(t.swap, s.swap.pct, gb(s.swap.used)+' / '+gb(s.swap.total)+' ('+s.swap.pct+'%)')}
        ${kv(t.diskFull, s.disk.pct, gb(s.disk.used)+' / '+gb(s.disk.total)+' ('+s.disk.pct+'%)')}
        <div class="kv"><span class="k">${t.uptime}</span><span class="v">${dur(s.uptime)}</span></div>
      </div>`;
    const topInner = `<div class="card">
        ${s.top.map(p=>`<div class="proc"><span class="pn">${p.name}</span>
          <span style="width:80px"><span class="bar"><i style="width:${p.rss/maxr*100}%"></i></span></span>
          <span class="pm">${gb(p.rss)}</span></div>`).join('')}
      </div>`;
    body = `
      <div class="grid gauges">
        ${ringHTML(t.cpu, s.cpu.pct, s.cpu.count+' '+(L==='tr'?'çekirdek':'cores'), s.hist&&s.hist.cpu, host.base+'|cpu')}
        ${ringHTML(t.mem, s.mem.pct, gb(s.mem.used)+' / '+gb(s.mem.total), s.hist&&s.hist.mem, host.base+'|mem')}
        ${ringHTML(t.diskUsed, s.disk.pct, gb(s.disk.used)+' / '+gb(s.disk.total))}
      </div>
      ${sec('runners', t.runners, `<div class="grid runners">${runners}</div>`)}
      ${sec('system', t.system, sysInner)}
      ${sec('procs', t.topMem, topInner)}`;
  }
  return `<div class="machine ${online?'':'moff'}" data-base="${esc(host.base)}">
    <div class="mhead" draggable="true" title="${L==='tr'?'sürükleyip sırala':'drag to reorder'}">
      <div class="mname"><span class="grip">⠿</span><span class="ic">💻</span>${name}</div>
      <div class="mright">
        ${online&&s.battery?batteryChip(s.battery):''}
        ${online&&s.localtime?`<span class="mtime" title="${esc(name)} local time">🕐 ${s.localtime}${s.tz?' '+esc(s.tz):''}</span>`:''}
        <span class="pill ${online?'idle':'offline'}"><span class="d"></span>${online?t.online:t.offline}</span>
      </div>
    </div>
    ${body}
  </div>`;
}

function computeAlerts(){
  const al=[];
  for(const h of hosts()){
    const e=lastData[h.base]; if(!e||!e.online)continue;
    const s=e.data, nm=h.self?s.host:(h.name||s.host||h.base);
    if(s.cpu.pct>=CRIT)al.push(`${nm} CPU %${s.cpu.pct.toFixed(0)}`);
    if(s.mem.pct>=CRIT)al.push(`${nm} RAM %${s.mem.pct.toFixed(0)}`);
    if(s.disk.pct>=CRIT)al.push(`${nm} Disk %${s.disk.pct.toFixed(0)}`);
  }
  const banner=document.getElementById('alertBanner');
  if(al.length){banner.style.display='flex';banner.textContent='⚠️ '+t.highUse+' '+al.join('  ·  ');
    document.title='⚠️ ('+al.length+') Mac Dashboard';}
  else{banner.style.display='none';document.title='Mac Dashboard';}
  notifyAlerts(al);
}
let prevAlerts=new Set();
function notifyAlerts(al){
  if(localStorage.getItem('sysdash-notify')!=='1'||!('Notification' in window)||Notification.permission!=='granted'){prevAlerts=new Set(al);return;}
  for(const a of al){ if(!prevAlerts.has(a)){ try{new Notification('⚠️ '+a);}catch(_){} } }
  prevAlerts=new Set(al);
}

function renderAll(){
  document.getElementById('title').textContent='Mac Dashboard';
  // subtitle from self
  const self=lastData[''];
  document.getElementById('subtitle').textContent = self&&self.online ? t.sub(self.data.tailscale_ip, self.data.cpu.count) : '';
  document.getElementById('machines').innerHTML = hosts().map(h=>machineHTML(h, lastData[h.base])).join('');
  document.getElementById('foot').textContent='sysdash'+(self&&self.online&&self.data.version?' v'+self.data.version:'')+' · '+t.refresh;
  computeAlerts();
}

async function pollHost(h){
  try{
    const r=await fetch((h.base||'')+'/api/stats',{cache:'no-store',signal:AbortSignal.timeout(4000)});
    lastData[h.base]={data:await r.json(), online:true};
  }catch(e){ lastData[h.base]={online:false}; }
}
async function tick(){
  if(DEMO_MODE){ DEMO_HOSTS.forEach(h=>{lastData[h.base]={data:h._d,online:true}}); if(!isDragging)renderAll(); if(chartKey)drawChart(); if(runnerKey)drawRunner(); document.getElementById('updated').textContent=t.live; return; }
  await Promise.all(hosts().map(pollHost));
  if(!isDragging)renderAll();
  if(chartKey)drawChart();
  if(runnerKey)drawRunner();
  document.getElementById('updated').textContent=t.live;
}
// clock: 24-hour by default; click to toggle 24h <-> AM/PM (persisted)
const CFKEY='sysdash-clock';
function clock12(){return localStorage.getItem(CFKEY)==='12'}
function fmtTime(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:clock12()})}
function clock(){document.getElementById('clock').textContent=fmtTime(new Date())}
(function(){const el=document.getElementById('clock');el.style.cursor='pointer';el.title='12 / 24 saat';
  el.addEventListener('click',()=>{localStorage.setItem(CFKEY,clock12()?'24':'12');clock();});})();

const mWrap=document.getElementById('machines');

mWrap.addEventListener('dragover',e=>{if(dragBase==null)return;e.preventDefault();const m=e.target.closest('.machine');mWrap.querySelectorAll('.machine.dragover').forEach(x=>x.classList.remove('dragover'));if(m)m.classList.add('dragover');});
mWrap.addEventListener('drop',e=>{if(dragBase==null)return;e.preventDefault();const m=e.target.closest('.machine');if(m){const order=hosts().map(h=>h.base).filter(b=>b!==dragBase);const ti=order.indexOf(m.dataset.base);order.splice(ti<0?order.length:ti,0,dragBase);setOrder(order);}dragBase=null;isDragging=false;renderAll();});
mWrap.addEventListener('dragend',()=>{dragBase=null;isDragging=false;mWrap.querySelectorAll('.machine.dragover').forEach(x=>x.classList.remove('dragover'));});
mWrap.addEventListener('click',e=>{

function drawRunner(){
  if(!runnerKey)return;

  const r=(e.data.runners||[])[runnerKey.ri]; if(!r){closeRunner();return;}
  const actions=r.repo?'https://github.com/'+r.repo+'/actions':'';
  const wfUrl=wf=>(r.repo&&wf)?'https://github.com/'+r.repo+'/actions/workflows/'+encodeURIComponent(wf):actions;
  const hist=(r.history&&r.history.length)?r.history.map(j=>{
    const ok=(j.result||'').toLowerCase()==='succeeded', cls=j.result?(ok?'ok':'fail'):'unk';
    return `<a class="rm-run" href="${wfUrl(j.workflow)}" target="_blank" rel="noopener">

      <span class="rm-wf">${esc(j.workflow||'workflow')}${j.branch?' · '+esc(j.branch):''}</span>

  }).join(''):`<div style="color:var(--muted);font-size:13px">${L==='tr'?'geçmiş çalışma bulunamadı':'no recent runs found'}</div>`;

  document.getElementById('runnerBody').innerHTML=`
    <div class="rm-repo">${esc(r.repo||'—')}</div>
    ${r.job?`<div class="rm-job">${jobHTML(r.job)}</div>`:''}
    <div class="rm-h">${L==='tr'?'Son çalışmalar':'Recent runs'}</div>
    ${hist}
    <div class="rm-links">
      ${actions?`<a href="${actions}" target="_blank" rel="noopener">${L==='tr'?'Actions sayfası':'Actions'} ↗</a>`:''}
      ${r.url?`<a href="${r.url}" target="_blank" rel="noopener">${L==='tr'?'Runner ayarları':'Runner settings'} ↗</a>`:''}
    </div>`;
}

// --- gauge chart modal ---
let chartKey=null;
function openChart(k){chartKey=k;drawChart();document.getElementById('chartModal').hidden=false;}
function closeChart(){chartKey=null;document.getElementById('chartModal').hidden=true;}
function drawChart(){
  if(!chartKey)return;
  const [base,metric]=chartKey.split('|');
  const e=lastData[base]; if(!e||!e.online){closeChart();return;}
  const s=e.data, arr=(s.hist&&s.hist[metric])||[];
  const nm=base===''?s.host:(s.host||base), label=metric==='cpu'?t.cpu:t.mem;
  const cur=arr.length?arr[arr.length-1]:0, mx=arr.length?Math.max(...arr):0, mn=arr.length?Math.min(...arr):0;
  document.getElementById('chartTitle').textContent=nm+' · '+label;
  const W=700,H=240,p=24;
  const path=arr.length>1?arr.map((v,i)=>`${(p+i/(arr.length-1)*(W-2*p)).toFixed(1)},${(H-p-(Math.max(0,Math.min(100,v))/100)*(H-2*p)).toFixed(1)}`).join(' '):'';
  const grid=[0,25,50,75,100].map(y=>{const yy=(H-p-(y/100)*(H-2*p)).toFixed(1);return `<line x1="${p}" y1="${yy}" x2="${W-p}" y2="${yy}" stroke="var(--line)" stroke-dasharray="3 4" opacity=".6"/><text x="2" y="${(+yy+4)}" fill="var(--muted)" font-size="10">${y}</text>`;}).join('');
  document.getElementById('chartBody').innerHTML=`
    <div style="display:flex;gap:18px;color:var(--muted);font-size:13px;margin-bottom:10px">
      <span>${L==='tr'?'şu an':'now'}: <b style="color:var(--txt)">${cur.toFixed(0)}%</b></span>
      <span>max: <b style="color:var(--txt)">${mx.toFixed(0)}%</b></span>
      <span>min: <b style="color:var(--txt)">${mn.toFixed(0)}%</b></span>
      <span style="margin-left:auto">${L==='tr'?'son':'last'} ~${Math.max(1,Math.round(arr.length/60))} ${L==='tr'?'dk':'min'}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${grid}
      <polyline points="${path}" fill="none" stroke="#4f8cff" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`;
}
document.getElementById('chartClose').addEventListener('click',closeChart);
document.getElementById('chartModal').addEventListener('click',e=>{if(e.target.id==='chartModal')closeChart();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeChart();closeRunner();}});

// --- notifications bell ---
const bell=document.getElementById('bellBtn');
function bellState(){const on=localStorage.getItem('sysdash-notify')==='1';
  bell.textContent=on?'🔔':'🔕';
  bell.classList.toggle('active',on);
  bell.title=on?(L==='tr'?'Bildirim AÇIK (kapatmak için tıkla)':'Notifications ON (click to turn off)')
               :(L==='tr'?'Bildirim kapalı (açmak için tıkla)':'Notifications off (click to turn on)');}
bell.addEventListener('click',async()=>{
  if(!('Notification' in window)){alert(L==='tr'?'Tarayıcı bildirim desteklemiyor':'Notifications not supported');return;}
  if(localStorage.getItem('sysdash-notify')==='1'){localStorage.setItem('sysdash-notify','0');bellState();return;}
  let perm=Notification.permission; if(perm!=='granted')perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert(L==='tr'?'İzin verilmedi. Bildirim için HTTPS gerekir — ./serve.sh ile açılan https://…ts.net adresinden dene.'
                   :'Permission denied. Notifications require HTTPS — open the https://…ts.net URL from ./serve.sh.');
    bellState();return;
  }
  localStorage.setItem('sysdash-notify','1');bellState();
  try{new Notification(L==='tr'?'🔔 Bildirimler açık':'🔔 Notifications enabled',{body:L==='tr'?'Kritik kullanımda haber vereceğim.':'You\'ll be alerted on critical usage.'});}catch(_){}
});

// --- tailnet peer auto-discovery ---
async function discover(){
  if(DEMO_MODE)return;
  try{
    const list=await (await fetch('/api/peers',{cache:'no-store',signal:AbortSignal.timeout(4000)})).json();
    const selfIp=(lastData['']&&lastData[''].online)?lastData[''].data.tailscale_ip:null;
    const found=[];
    await Promise.all((list||[]).map(async p=>{
      if(!p.ip||p.ip===selfIp)return;
      const base='http://'+p.ip+':8765';
      try{const r=await fetch(base+'/api/stats',{cache:'no-store',signal:AbortSignal.timeout(2500)});
        if(r.ok){lastData[base]={data:await r.json(),online:true};found.push({base});}}catch(_){}
    }));
    autoPeers=found;
  }catch(_){}
}

applyLang(); applyTheme(); bellState(); if(!DEMO_MODE) renderHostbar();
setInterval(clock,1000); clock();
tick(); setInterval(tick,1000);
discover(); setInterval(discover,30000);
if('serviceWorker' in navigator && location.protocol!=='file:') navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
