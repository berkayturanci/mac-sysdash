<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mac Dashboard</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mac Dashboard">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>(function(){var u=new URLSearchParams(location.search).get('theme');
  var x=function(v){return v==='light'||v==='dark'||v==='night'};
  var p=x(u)?u:(localStorage.getItem('sysdash-theme')||'auto');
  var d=x(p)?p:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.dataset.theme=d;})();</script>
<style>
  :root{
    --bg:#0a0e14; --panel:#131822; --panel2:#1a212e; --line:#222b3a;
    --txt:#ccd6e2; --muted:#8493a8; --accent:#4f8cff;
    --green:#2ecc71; --amber:#f5a623; --red:#ff5c5c; --gray:#56627a;
    --track:#0d1320;
    --bggrad:radial-gradient(1200px 700px at 80% -10%,#16203a 0%,#0a0e14 55%);
    --shadow:0 10px 30px rgba(0,0,0,.25);
    --pill-idle-fg:#bcd3ff; --pill-idle-bg:rgba(79,140,255,.15); --pill-idle-bd:rgba(79,140,255,.4);
    --pill-busy-fg:#aee9c8; --pill-busy-bg:rgba(46,204,113,.15); --pill-busy-bd:rgba(46,204,113,.4);
    --pill-off-fg:#c2cad8; --pill-off-bg:rgba(120,135,160,.16); --pill-off-bd:rgba(120,135,160,.4);
  }
  :root[data-theme="light"]{
    --bg:#eef2f8; --panel:#ffffff; --panel2:#f6f9fd; --line:#e1e8f1;
    --txt:#16202e; --muted:#5a6678; --accent:#2f6bf0;
    --green:#149a4c; --amber:#c8810b; --red:#df3b3b; --gray:#7a879d;
    --track:#e6ecf4;
    --bggrad:radial-gradient(1200px 700px at 80% -10%,#dbe7ff 0%,#eef2f8 55%);
    --shadow:0 8px 24px rgba(40,60,100,.10);
    --pill-idle-fg:#1948b3; --pill-idle-bg:rgba(47,107,240,.12); --pill-idle-bd:rgba(47,107,240,.45);
    --pill-busy-fg:#0a7a3a; --pill-busy-bg:rgba(20,154,76,.13); --pill-busy-bd:rgba(20,154,76,.45);
    --pill-off-fg:#52607a; --pill-off-bg:rgba(90,102,120,.12); --pill-off-bd:rgba(90,102,120,.4);
  }
  /* night: very dark, low-contrast, desaturated, no motion — for working at night */
  :root[data-theme="night"]{
    --bg:#04060a; --panel:#080b10; --panel2:#0a0e14; --line:#161c26;
    --txt:#8b97a8; --muted:#525d6e; --accent:#5777a0;
    --green:#487a5f; --amber:#8f7740; --red:#9e5a5a; --gray:#384150;
    --track:#090d12;
    --bggrad:#04060a;
    --shadow:none;
    --pill-idle-fg:#7e93b3; --pill-idle-bg:rgba(87,119,160,.12); --pill-idle-bd:rgba(87,119,160,.3);
    --pill-busy-fg:#6fae8c; --pill-busy-bg:rgba(72,122,95,.12); --pill-busy-bd:rgba(72,122,95,.3);
    --pill-off-fg:#5b6677; --pill-off-bg:rgba(60,70,86,.14); --pill-off-bd:rgba(60,70,86,.35);
  }
  :root[data-theme="night"] *{animation:none!important}          /* no pulsing/motion */
  :root[data-theme="night"] .wrap{filter:saturate(.6)}          /* calmer, less colorful */
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bggrad);
    color:var(--txt);font:14px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif;
    min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
  }
  .wrap{max-width:1680px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px}
  .hl{display:flex;align-items:center;gap:14px}
  .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#4f8cff,#9b5cff);
    display:grid;place-items:center;font-size:22px;box-shadow:0 6px 20px rgba(79,140,255,.35);flex:0 0 auto}
  h1{font-size:18px;font-weight:650;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .right{display:flex;align-items:center;gap:10px}
  .iconbtn{cursor:pointer;height:42px;min-width:42px;padding:0 12px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);font-size:16px;display:grid;place-items:center;
    transition:transform .15s,background .3s,border-color .3s;box-shadow:var(--shadow);flex:0 0 auto}
  .iconbtn:hover{transform:translateY(-1px)}
  .iconbtn:active{transform:scale(.94)}
  .iconbtn.active{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 14px rgba(79,140,255,.45)}
  .clock{text-align:right}
  .clock .t{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums}
  .clock .live{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:2px}
  .dotlive{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

  .hostbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);font-size:12.5px;color:var(--muted)}
  .chip b{color:var(--txt);font-weight:600}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:700;padding:0 2px}
  .chip .x:hover{color:var(--red)}

  .banner{display:none;align-items:center;gap:10px;background:rgba(255,92,92,.13);
    border:1px solid rgba(255,92,92,.5);color:var(--red);padding:12px 16px;border-radius:14px;
    margin-bottom:16px;font-weight:650;font-size:14px;animation:pulse 1.8s infinite}

  .fleet{display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);padding:14px 20px;border-radius:14px;margin-bottom:16px;box-shadow:var(--shadow);flex-wrap:wrap}
  .f-stat{display:flex;align-items:center;gap:8px}
  .f-stat .n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .f-stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
  .f-sep{width:1px;height:24px;background:var(--line)}


  /* fit as many machines side by side as the width allows, then wrap down */
  .machines{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:18px;align-items:start}
  /* cap a panel's content width so a lone machine doesn't stretch awkwardly */
  .machine{max-width:760px;width:100%;margin:0 auto;min-width:0}
  .machine{display:flex;flex-direction:column;gap:0}
  .mhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .mname{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
  .mname .ic{font-size:20px}
  .mright{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .mtime{font-variant-numeric:tabular-nums;font-weight:600;color:var(--muted);font-size:13px;white-space:nowrap}
  .batt{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;white-space:nowrap;color:var(--muted)}
  .batt.low{color:var(--red)}
  .batt.warn{color:var(--amber)}
  .spark{width:100%;height:22px;margin-top:8px;opacity:.75;display:block}
  .moff{opacity:.6}
  .mhead[draggable]{cursor:grab} .mhead[draggable]:active{cursor:grabbing}
  .grip{color:var(--muted);opacity:.45;font-size:14px;margin-right:2px}
  .machine.dragover{outline:2px dashed var(--accent);outline-offset:5px;border-radius:18px}
  .section-title.collapsible{cursor:pointer;user-select:none}
  .section-title.collapsible:hover{color:var(--txt)}
  .chev{margin-left:8px;font-size:11px;color:var(--muted)}
  .histrow{display:flex;gap:5px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  .hdot{width:9px;height:9px;border-radius:3px;background:var(--gray)}
  .hdot.ok{background:var(--green)} .hdot.fail{background:var(--red)}
  .gauge.clickable{cursor:pointer} .gauge.clickable:hover{border-color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal[hidden]{display:none}
  .modal-card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:22px;max-width:760px;width:100%;box-shadow:var(--shadow);max-height:calc(100vh - 40px);overflow-y:auto}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-weight:650;font-size:15px}
  .mclose{cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .mclose:hover{color:var(--txt)}

  .grid{display:grid;gap:14px}
  .gauges{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:18px;padding:18px;box-shadow:var(--shadow);transition:background .3s,border-color .3s,transform .15s;min-width:0}
  .gauge{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px}
  .gauge .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:650;text-align:center}
  .ring{position:relative;width:100%;max-width:128px;aspect-ratio:1;height:auto}
  .ring svg{transform:rotate(-90deg);width:100%;height:100%;display:block}
  .ring .track{stroke:var(--track)}
  .ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
  .gmeta{color:var(--muted);font-size:12px;margin-top:4px;text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums}
  .gauge.crit{border-color:rgba(255,92,92,.6);box-shadow:0 0 0 1px rgba(255,92,92,.35),0 10px 30px rgba(255,92,92,.18)}
  .alert-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:10.5px;
    font-weight:800;padding:4px 8px;border-radius:999px;letter-spacing:.3px;
    box-shadow:0 2px 10px rgba(255,92,92,.5);animation:pulse 1.1s infinite;z-index:2}

  .section-title{display:flex;align-items:center;gap:8px;margin:22px 0 12px;font-size:12px;
    text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);font-weight:700}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .runners{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .runner{position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block}
  .runner.clickable{cursor:pointer}
  .runner.clickable:hover{transform:translateY(-2px);border-color:var(--accent)}
  .runner .row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .runner  .mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--bg)}
  .mhead .mname{font-weight:650;font-size:15px;display:flex;align-items:center;gap:8px}
  .mhead[draggable]{cursor:grab} .mhead[draggable]:active{cursor:grabbing}
  .grip{color:var(--muted);cursor:grab;font-size:16px;user-select:none;margin-right:2px}
  .grip:active{cursor:grabbing}
  .sec-wrap{transition: transform 0.2s; border-radius:8px;}
  .sec-wrap.dragover{background:var(--track); opacity:0.7;}
  .runner .ext{color:var(--muted);font-size:13px;font-weight:400}
  .runner .repo{color:var(--muted);font-size:12px;margin-top:3px;word-break:break-all}
  .runner .up{color:var(--muted);font-size:12px;margin-top:12px;font-variant-numeric:tabular-nums}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
    font-size:12px;font-weight:700;border:1px solid transparent;flex:0 0 auto}
  .pill .d{width:9px;height:9px;border-radius:50%}
  .pill.busy{color:var(--pill-busy-fg);background:var(--pill-busy-bg);border-color:var(--pill-busy-bd)}
  .pill.busy .d{background:var(--green);animation:pulse 1.2s infinite}
  .pill.idle{color:var(--pill-idle-fg);background:var(--pill-idle-bg);border-color:var(--pill-idle-bd)}
  .pill.idle .d{background:var(--accent)}
  .pill.offline{color:var(--pill-off-fg);background:var(--pill-off-bg);border-color:var(--pill-off-bd)}
  .runfilter{display:flex;gap:6px;margin:-2px 0 10px}
  .rf{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;transition:background .2s,color .2s}
  .rf.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pill.stale{color:var(--amber);background:rgba(245,166,35,.13);border-color:rgba(245,166,35,.4)}
  .pill.stale .d{background:var(--amber)}
  .pill.offline .d{background:var(--gray)}
  .jobinfo{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:5px}
  .jline{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jline.jstrong{font-weight:700;font-size:12.5px}
  .jmuted{color:var(--muted);font-style:italic}
  /* on hover, reveal everything that was truncated */
  .runner.clickable:hover .jline,.runner.clickable:hover .repo{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word}
  .rm-repo{color:var(--muted);font-size:13px;margin-bottom:12px}
  .rm-job{margin-bottom:14px}
  #runnerActiveJob .jline{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word;line-height:1.4}
  .rm-h{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin:6px 0 8px}
  .rm-run{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;text-decoration:none;color:inherit;border:1px solid transparent}
  .rm-run:hover{background:var(--track);border-color:var(--line)}
  .rm-run .rm-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;line-height:1.3}
  .rm-run .rm-job{font-weight:600;font-size:13.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rm-run .rm-sub{color:var(--muted);font-weight:400;font-size:12px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rm-run .rm-meta{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
  .rm-links{display:flex;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .rm-links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:13px}
  /* runner modal: summary strip + job-stats table */
  .rm-sum{display:flex;gap:10px;margin:2px 0 18px}
  .rm-sum .s{flex:1;background:var(--track);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .rm-sum .s .n{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.05}
  .rm-sum .s .n.ok{color:var(--green)} .rm-sum .s .n.warn{color:#f5a623} .rm-sum .s .n.bad{color:var(--red)}
  .rm-sum .s .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .rm-stats{display:flex;flex-direction:column;margin-bottom:4px}
  .rm-sthead,.rm-stat{display:flex;align-items:center;gap:12px;padding:6px 8px}
  .rm-sthead{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);padding-bottom:7px}
  .rm-stat{border-radius:8px}
  .rm-stat:hover{background:var(--track)}
  .rm-stats .c-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rm-stat .c-name{font-weight:600;font-size:13px}
  .rm-stats .c-runs{flex-shrink:0;width:54px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px}
  .rm-stats .c-sr{flex-shrink:0;width:96px;display:flex;align-items:center;justify-content:flex-end;gap:7px;font-size:12.5px}
  .rm-stat .c-sr .bar{width:34px;height:5px;border-radius:3px;background:var(--line);overflow:hidden}
  .rm-stat .c-sr .bar i{display:block;height:100%;border-radius:3px}
  .rm-stat .c-sr .pct{font-variant-numeric:tabular-nums;font-weight:600;min-width:34px;text-align:right}
  .rm-stat .c-sr .pct.ok{color:var(--green)} .rm-stat .c-sr .pct.warn{color:#f5a623} .rm-stat .c-sr .pct.bad{color:var(--red)}
  .rm-stats .c-med{flex-shrink:0;width:80px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px;white-space:nowrap;overflow:hidden}
  .rm-stat .trend.up{color:var(--red)} .rm-stat .trend.dn{color:var(--green)}
  .rm-stats + .rm-h{margin-top:18px}  /* breathing room before "Recent runs" */
  .runner.busy{border-color:var(--pill-busy-bd)}
  .runner.busy::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}

  .kv{display:flex;justify-content:space-between;white-space:nowrap;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)}
  .kv .v{font-variant-numeric:tabular-nums;font-weight:650}
  .kv .v.crit{color:var(--red)}
  .bar{height:7px;border-radius:6px;background:var(--track);overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#4f8cff,#9b5cff);transition:width .5s}
  .proc{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px}
  .proc .pn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .proc .pm{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px}
  .cores{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
  .core{flex:1;min-width:12px;height:32px;background:var(--track);border-radius:4px;position:relative;overflow:hidden}
  .core>i{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#9b5cff,#4f8cff);transition:height .4s}
  .offline-card{color:var(--muted);text-align:center;padding:40px 18px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px}
  /* runner CI heatmap (modal): coloured by health (not volume), GitHub-style grid */
  .heatwrap{margin-top:2px}
  .heatgrid{display:grid;grid-template-rows:repeat(7,11px);grid-auto-flow:column;grid-auto-columns:11px;gap:3px}
  .hsq{width:11px;height:11px;border-radius:3px;background:var(--line)}
  .hsq.none{background:var(--line)}
  .hsq.ok{background:var(--green)}
  .hsq.mix{background:#f5a623}
  .hsq.bad{background:var(--red)}
  .hsq.pad{background:transparent}
  .heatleg{display:flex;align-items:center;gap:6px;margin-top:9px;color:var(--muted);font-size:11.5px}
  .heatleg .hsq{width:10px;height:10px}

  @media(max-width:520px){
    body{padding:14px}
    h1{font-size:16px}
    .clock .t{font-size:18px}
    .machines{grid-template-columns:1fr}
    .gauges{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .gauge{padding:12px 6px}
    .gauge .label{font-size:10px;letter-spacing:.3px}
    .ring .pct{font-size:21px}
    .gmeta{font-size:10px;white-space:normal}
    .runners{grid-template-columns:1fr}
    /* buttons left, clock pushed to the far right on the same row */
    .right{width:100%}
    .clock{margin-left:auto;text-align:right}
  }
  @keyframes pulse{0%{opacity:1}50%{opacity:.55}100%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hl">
      <div class="logo">💻</div>
      <div>
        <h1 id="title">Mac Dashboard</h1>
        <div class="sub" id="subtitle"></div>
      </div>
    </div>
    <div class="right">
      <button id="bellBtn" class="iconbtn" title="Notifications">🔕</button>
      <button id="langBtn" class="iconbtn" title="Language">🌐</button>

function hosts(){

function getOrder(){try{return JSON.parse(localStorage.getItem('sysdash-order'))||[]}catch(e){return []}}
function setOrder(b){localStorage.setItem('sysdash-order',JSON.stringify(b));}
function orderHosts(list){const ord=getOrder();const ix=b=>{const i=ord.indexOf(b);return i<0?1e6:i};
  return list.map((h,i)=>[h,i]).sort((a,b)=>(ix(a[0].base)-ix(b[0].base))||(a[1]-b[1])).map(x=>x[0]);}


// ---------------- rendering ----------------
const WARN=75, CRIT=95, R=66, C=2*Math.PI*R;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function jobHTML(j){
  const p=[];
  if(j.name) p.push(`<div class="jline jstrong" title="${esc(j.name)}">▶ ${esc(j.name)}</div>`);
  if(j.pr) p.push(`<div class="jline" title="PR #${j.pr}${j.pr_title?' — '+esc(j.pr_title):''}">🔀 PR #${j.pr}${j.pr_title?' · '+esc(j.pr_title):''}</div>`);
  if(j.issue) p.push(`<div class="jline"># issue #${j.issue}</div>`);
  if(j.branch) p.push(`<div class="jline" title="${esc(j.branch)}${j.base?' → '+esc(j.base):''}">⎇ ${esc(j.branch)}${j.base?' → '+esc(j.base):''}</div>`);
  if(j.tag) p.push(`<div class="jline" title="${esc(j.tag)}">🏷 ${esc(j.tag)}</div>`);
  if(j.workflow) p.push(`<div class="jline" title="${esc(j.workflow)}">⚙ ${esc(j.workflow)}</div>`);
  if(j.actor) p.push(`<div class="jline jmuted">👤 ${esc(j.actor)}</div>`);
  if(j.commit) p.push(`<div class="jline jmuted" title="${esc(j.commit)}">“${esc(j.commit)}”</div>`);
  return p.length?`<div class="jobinfo">${p.join('')}</div>`:'';
}
function gb(b){return (b/1073741824).toFixed(1)+' GB'}
function rate(bps){if(bps==null)return '0';const u=['B','KB','MB','GB'];let i=0,v=bps;while(v>=1024&&i<u.length-1){v/=1024;i++}return (i?v.toFixed(1):v.toFixed(0))+' '+u[i]+'/s'}
function tsFmt(ts) {
  const d = new Date(ts*1000), n = new Date();
  const time = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  if(d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear()) return time;
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + time;
}
function batteryChip(b){
  if(!b)return '';
  const low=!b.plugged&&b.pct<=20;          // red text + low-battery icon
  const warn=!b.plugged&&b.pct<=40;         // amber text
  const icon=low?'🪫':'🔋';                  // 🪫 = low battery
  let t='';
  if(b.secsleft){const h=Math.floor(b.secsleft/3600),m=Math.floor(b.secsleft%3600/60);t=' · '+(h?h+'s ':'')+m+'d';}
  return `<span class="batt ${low?'low':warn?'warn':''}" title="${b.plugged?'şarjda':'pil'}${t}">${icon} ${b.pct}%${b.plugged?' ⚡':''}</span>`;
}
function sparkSVG(arr,col){
  if(!arr||arr.length<2)return '';
  const n=arr.length;
  const pts=arr.map((v,i)=>`${(i/(n-1)*100).toFixed(1)},${(23-(Math.max(0,Math.min(100,v))/100*21)).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 100 24" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>`;
}
function sparkSVGNet(arrDown, arrUp){
  if(!arrDown||arrDown.length<2||!arrUp||!arrUp.length)return '';
  const n=arrDown.length;
  const maxD=Math.max(...arrDown, 1), maxU=Math.max(...arrUp, 1);
  const maxAll=Math.max(maxD, maxU);
  const ptsD=arrDown.map((v,i)=>`${(i/(n-1)*100).toFixed(1)},${(23-(v/maxAll*21)).toFixed(1)}`).join(' ');
  const ptsU=arrUp.map((v,i)=>`${(i/(n-1)*100).toFixed(1)},${(23-(v/maxAll*21)).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 100 24" preserveAspectRatio="none">
    <polyline points="${ptsD}" fill="none" stroke="var(--accent)" stroke-width="1.6" vector-effect="non-scaling-stroke" opacity="0.8"/>
    <polyline points="${ptsU}" fill="none" stroke="var(--green)" stroke-width="1.6" vector-effect="non-scaling-stroke" opacity="0.8"/>
  </svg>`;
}
function dur(s){if(s==null)return '—';const u=t.dunit;let d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);
  if(d)return `${d}${u.d} ${h}${u.h}`; if(h)return `${h}${u.h} ${m}${u.m}`; if(m)return `${m}${u.m}`; return `${sec}${u.s}`}
function ringHTML(label,pct,meta,spark,chart){
  const crit=pct>=CRIT, warn=pct>=WARN;
  const col=crit?'#ff5c5c':warn?'#f5a623':'#4f8cff';
  const off=C*(1-pct/100);
  return `<div class="card gauge ${crit?'crit':''} ${chart?'clickable':''}"${chart?` data-chart="${esc(chart)}"`:''}>
    ${crit?`<div class="alert-badge">⚠️ %${pct.toFixed(0)}</div>`:''}
    <div class="label">${label}</div>
    <div class="ring"><svg width="128" height="128" viewBox="0 0 150 150">
      <circle class="track" cx="75" cy="75" r="${R}" stroke-width="13" fill="none"/>
      <circle cx="75" cy="75" r="${R}" stroke="${col}" stroke-width="13" fill="none"
        stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
    </svg><div class="val"><div class="pct">${pct.toFixed(0)}<span style="font-size:14px">%</span></div></div></div>
    <div class="gmeta">${meta}</div>
    ${sparkSVG(spark,col)}
  </div>`;
}
// collapsible sections (global across machines)
function runFilter(){return localStorage.getItem('sysdash-runfilter')||'all'}

function pinnedState(){try{return JSON.parse(localStorage.getItem('sysdash-pinned'))||[]}catch(e){return []}}

function sec(key,title,inner,hb){const ck=hb?hb+'-'+key:key;const c=isCollapsed(ck);const p=isPinned(ck);

function historyHTML(h){
  if(!h||!h.length)return '';

    const lbl=j.job||j.workflow||'';

}


function machineHTML(host, entry){
  const online = entry && entry.online;
  const s = online ? entry.data : null;
  const name = host.self ? (s?s.host:'Bu Mac') : (host.name || (s?s.host:host.base));
  const stale = online && s && s._age != null && s._age > 6;  // pushed peer stopped updating
  let body;
  if(!online){
    body = `<div class="card offline-card">⚠️ ${t.unreachable}<br><span style="font-size:12px">${host.base||''}</span></div>`;
  } else {
    const kv=(label,pct,txt)=>`<div class="kv"><span class="k">${label}</span><span class="v ${pct>=CRIT?'crit':''}">${txt}</span></div>`;
    const rf=runFilter();
    const rows=s.runners.map((r,ri)=>{
      if(rf==='active' && r.status!=='busy') return '';
      return `<div class="card runner clickable ${r.status}" data-base="${esc(host.base)}" data-ri="${ri}" title="${L==='tr'?'detay için tıkla':'click for details'}">
        <div class="row1"><div class="name">${esc(r.name)}<span class="ext">▸</span></div>
          <span class="pill ${r.status}"><span class="d"></span>${t.st[r.status]}</span></div>
        <div class="repo">${esc(r.repo||'—')}</div>
        <div class="up">${r.status==='offline'?t.notRunning:t.up+dur(r.uptime)}</div>
        ${r.job?jobHTML(r.job):''}
        ${historyHTML(r.history)}
        
      </div>`;
    }).filter(Boolean);
    const runners = rows.length ? rows.join('')
      : `<div class="card" style="color:var(--muted);grid-column:1/-1">${rf==='active'?t.noActive:t.noRunners}</div>`;
    const runnersInner = `<div class="runfilter">
        <button class="rf ${rf==='all'?'on':''}" data-rf="all">${t.fAll}</button>
        <button class="rf ${rf==='active'?'on':''}" data-rf="active">${t.fActive}</button>
      </div><div class="grid runners">${runners}</div>`;
    const topMem = Array.isArray(s.top) ? s.top : [];
    const topCpu = Array.isArray(s.top_cpu) ? s.top_cpu : [];
    const maxr = Math.max(...topMem.map(p=>p.rss), 1);
    const maxc = Math.max(...topCpu.map(p=>p.cpu||0), 100);
    const load1 = s.cpu.load[0], lratio = s.cpu.count ? load1 / s.cpu.count : 0;
    const lcol = lratio >= 2 ? 'var(--red)' : lratio >= 1 ? '#f5a623' : 'var(--accent)';
    const lpct = Math.min(100, Math.max(2, lratio * 50)); // 1.0 -> 50%, 2.0 -> 100%
    const tf = topFilter();
    
    const sysInner = `<div class="card">
        <div class="kv"><span class="k">${t.perCore}</span><span class="v">${s.cpu.pct.toFixed(0)}%</span></div>
        <div class="cores">${s.cpu.cores.map(c=>`<div class="core" title="${c}%"><i style="height:${c}%"></i></div>`).join('')}</div>
        <div class="kv" style="margin-top:12px"><span class="k">${t.load}</span><span class="v ${lratio>=2?'crit':''}">${s.cpu.load.join('  /  ')}</span></div>
        <div class="bar"><i style="width:${lpct}%;background:${lcol}"></i></div>

          const resetTitle = iso => iso ? ' title="'+(L==='tr'?'sıfırlanma: ':'resets: ')+new Date(iso).toLocaleString([],{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+'"' : '';

      if (s.ai_fda && s.ai_fda.blocked && s.ai_fda.path) {

      ai: aiInner ? sec('ai', 'AI Copilot', aiInner, host.base) : ''
    };
    const order = getWidgetOrder(host.base);
    // Ensure all widgets are rendered even if missing from order
    let bodyArr = [];

    if (aiInner && !keys.includes('ai')) keys.push('ai');
    for (const k of keys) {

      } else {
        bodyArr.push(widgets[k]);
      }
    }
    body = bodyArr.join('');
  }
  return `<div class="machine ${(!online||stale)?'moff':''}" data-base="${esc(host.base)}">
    <div class="mhead" draggable="true" title="${L==='tr'?'sürükleyip sırala':'drag to reorder'}">

      </div>
    </div>
    ${body}
  </div>`;
}

let seenRunners={};
const STUCK_SECS=30*60;

function computeAlerts(){
  const sysAl=[], runAl=[];
  for(const h of hosts()){
    const e=lastData[h.base]; if(!e||!e.online)continue;
    const s=e.data, nm=h.self?s.host:(h.name||s.host||h.base);
    if(s.cpu.pct>=CRIT)sysAl.push(`${nm} CPU %${s.cpu.pct.toFixed(0)}`);
    if(s.mem.pct>=CRIT)sysAl.push(`${nm} RAM %${s.mem.pct.toFixed(0)}`);
    if(s.disk.pct>=CRIT)sysAl.push(`${nm} Disk %${s.disk.pct.toFixed(0)}`);
    
    for(const r of (s.runners||[])){
      const k = nm+':'+r.name;
      const isOnline = r.status!=='offline';
      if(seenRunners[k] && !isOnline) runAl.push(`${nm} runner ${r.name} offline`);
      if(isOnline) seenRunners[k] = true;
      if(r.status==='busy' && r.job && r.job.elapsed > STUCK_SECS) {
        runAl.push(`${nm} ${r.name}: ${r.job.name||'job'} ${dur(r.job.elapsed)}`);
      }
    }
  }
  const al = sysAl.concat(runAl);
  const banner=document.getElementById('alertBanner');
  if(al.length){
    banner.style.display='flex';
    banner.textContent='⚠️ ' + (sysAl.length ? t.highUse+' ' : '') + al.join('  ·  ');
    document.title='⚠️ ('+al.length+') Mac Dashboard';
  } else {
    banner.style.display='none';document.title='Mac Dashboard';
  }
  notifyAlerts(al);
}
let prevAlerts=new Set();
function notifyAlerts(al){
  if(localStorage.getItem('sysdash-notify')!=='1'||!('Notification' in window)||Notification.permission!=='granted'){prevAlerts=new Set(al);return;}
  for(const a of al){ if(!prevAlerts.has(a)){ try{new Notification('⚠️ '+a);}catch(_){} } }
  prevAlerts=new Set(al);
}

function renderAll(){
  document.getElementById('title').textContent='Mac Dashboard';
  // subtitle from self
  const self=lastData[''];
  document.getElementById('subtitle').textContent = self&&self.online ? t.sub(self.data.tailscale_ip, self.data.cpu.count) : '';
  
  let mTotal=0, mOnline=0, rBusy=0, rIdle=0, rOff=0;
  const hs=hosts();
  for(const h of hs){
    mTotal++;
    const e=lastData[h.base]; if(!e||!e.online)continue;
    mOnline++;
    for(const r of (e.data.runners||[])){
      if(r.status==='busy') rBusy++;
      else if(r.status==='idle') rIdle++;
      else rOff++;
    }
  }
  const fHtml = `<div class="fleet">
    <div class="f-stat"><div class="n" style="color:var(--txt)">${mOnline}<span style="font-size:14px;color:var(--muted)">/${mTotal}</span></div><div class="l">${L==='tr'?'ONLİNE MAKİNE':'MACHINES ONLINE'}</div></div>
    <div class="f-sep"></div>
    <div class="f-stat"><div class="n" style="color:var(--green)">${rBusy}</div><div class="l">${L==='tr'?'ÇALIŞAN RUNNER':'BUSY RUNNERS'}</div></div>
    <div class="f-stat"><div class="n" style="color:var(--accent)">${rIdle}</div><div class="l">${L==='tr'?'BOŞTA RUNNER':'IDLE RUNNERS'}</div></div>
    <div class="f-stat"><div class="n" style="color:var(--muted)">${rOff}</div><div class="l">${L==='tr'?'KAPALI RUNNER':'OFFLINE RUNNERS'}</div></div>
  </div>`;
  document.getElementById('fleetOverview').innerHTML = fHtml;

  window.pinnedHtml = [];
  const mHtml = hs.map(h=>machineHTML(h, lastData[h.base])).join('');
  let finalHtml = '';
  if (window.pinnedHtml.length > 0) {
    finalHtml += `<div id="pinned-area" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:18px;margin-bottom:24px;border-bottom:1px solid var(--line);padding-bottom:24px">${window.pinnedHtml.join('')}</div>`;
  }
  finalHtml += `<div class="machines">${mHtml}</div>`;
  document.getElementById('machines').innerHTML = finalHtml;
  document.getElementById('foot').textContent='sysdash'+(self&&self.online&&self.data.version?' v'+self.data.version:'')+' · '+t.refresh+' · © Berkay Turancı';
  computeAlerts();
}

async function pollHost(h){
  try{
    const r=await fetch(h.statsUrl||((h.base||'')+'/api/stats'),{cache:'no-store',signal:AbortSignal.timeout(4000)});
    lastData[h.base]={data:await r.json(), online:true};
  }catch(e){ lastData[h.base]={online:false}; }
}
async function tick(){
  if(DEMO_MODE){ DEMO_HOSTS.forEach(h=>{lastData[h.base]={data:h._d,online:true}}); if(!isDragging)renderAll(); if(chartKey)drawChart(); if(runnerKey)drawRunner(); document.getElementById('updated').textContent=t.live; return; }
  await Promise.all(hosts().map(pollHost));
  if(!isDragging)renderAll();
  if(chartKey)drawChart();
  if(runnerKey)drawRunner();
  document.getElementById('updated').textContent=t.live;
}

// --- drag to reorder + collapse + gauge chart (delegated on #machines) ---
function getWidgetOrder(hb){try{return JSON.parse(localStorage.getItem('sysdash-widget-order-'+hb))||['gauges','runners','system','procs','ai']}catch(e){return ['gauges','runners','system','procs','ai']}}

let dragBase=null, dragWidget=null, isDragging=false;
const mWrap=document.getElementById('machines');
mWrap.addEventListener('dragstart',e=>{
  const h=e.target.closest('.mhead');
  const w=e.target.closest('.sec-wrap');
  if(h) {
    dragBase=h.closest('.machine').dataset.base;
    dragWidget=null;
  } else if(w) {
    dragWidget=w.dataset.widget;
    dragBase=null;
  } else return;
  isDragging=true;
  try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragBase||dragWidget);}catch(_){}
});
mWrap.addEventListener('dragover',e=>{
  if(!isDragging)return;
  e.preventDefault();
  mWrap.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover'));
  if(dragBase!=null) {
    const m=e.target.closest('.machine');
    if(m) m.classList.add('dragover');
  } else if(dragWidget!=null) {
    const w=e.target.closest('.sec-wrap');
    if(w && w.dataset.widget!==dragWidget) w.classList.add('dragover');
  }
});
mWrap.addEventListener('drop',e=>{
  if(!isDragging)return;
  e.preventDefault();
  if(dragBase!=null) {
    const m=e.target.closest('.machine');
    if(m){const order=hosts().map(h=>h.base).filter(b=>b!==dragBase);const ti=order.indexOf(m.dataset.base);order.splice(ti<0?order.length:ti,0,dragBase);setOrder(order);}
  } else if(dragWidget!=null) {
    const w=e.target.closest('.sec-wrap');
    if(w) {
      const col = w.closest('.machine');
      const hb = col ? col.dataset.base : '';
      let ord=getWidgetOrder(hb).filter(k=>k!==dragWidget);
      const ti=ord.indexOf(w.dataset.widget);
      ord.splice(ti<0?ord.length:ti, 0, dragWidget);
      localStorage.setItem('sysdash-widget-order-'+hb, JSON.stringify(ord));
    }
  }
  dragBase=null; dragWidget=null; isDragging=false; renderAll();
});
mWrap.addEventListener('dragend',()=>{dragBase=null;dragWidget=null;isDragging=false;mWrap.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover'));});
mWrap.addEventListener('click',e=>{
  if(e.target.closest('.grip')) return; // do not collapse on grip click
  const tfb=e.target.closest('.rf.tf'); if(tfb){setTopFilter(tfb.dataset.tf);return;}
  const rfb=e.target.closest('.rf'); if(rfb){setRunFilter(rfb.dataset.rf);return;}
  const pb=e.target.closest('.pin'); if(pb){e.stopPropagation();togglePin(pb.dataset.sec);return;}
  const st=e.target.closest('.section-title.collapsible'); if(st){toggleCollapse(st.dataset.sec);return;}
  const rn=e.target.closest('.runner.clickable'); if(rn){openRunner(rn.dataset.base,+rn.dataset.ri);return;}
  const g=e.target.closest('.gauge.clickable'); if(g&&g.dataset.chart){openChart(g.dataset.chart);}
});

let runnerKey=null;
function openRunner(base,ri){runnerKey={base,ri};document.getElementById('runnerBody').dataset.histHash='';drawRunner();document.getElementById('runnerModal').hidden=false;}
function closeRunner(){runnerKey=null;document.getElementById('runnerModal').hidden=true;}
let currentRunnerFetches=0;
// 30-day CI health heatmap for one runner. Coloured by OUTCOME, not volume:
// green = all ok, amber = some fails, red = all fails, muted = no jobs. Dates are
// UTC to match the server's date(ts,'unixepoch') keys in jobs_summary.
function heatmapHTML(summary){
  const data = summary || {};
  if(!Object.keys(data).length) return '';
  const today = new Date(), cells = [];
  for(let i=29;i>=0;i--){
    const dt = new Date(today.getTime() - i*86400000);
    const ds = dt.toISOString().slice(0,10);
    const st = data[ds]; let cls='none', tip=ds+' · '+(L==='tr'?'iş yok':'no jobs');
    if(st){
      const ok=st.succeeded||0, fail=st.failed||0, tot=ok+fail+(st.other||0);
      cls = fail>0 ? (ok===0?'bad':'mix') : (ok>0?'ok':(tot>0?'mix':'none'));
      tip = `${ds} · ${tot} ${L==='tr'?'iş':'jobs'} · ${ok} ok · ${fail} fail`;
    }
    cells.push({cls, tip, wd: dt.getUTCDay()});
  }
  let sq='';
  for(let p=0;p<cells[0].wd;p++) sq+='<div class="hsq pad"></div>';
  for(const c of cells) sq+=`<div class="hsq ${c.cls}" title="${esc(c.tip)}"></div>`;
  const lg=(cls,txt)=>`<span class="hsq ${cls}"></span>${txt}`;
  return `<div class="rm-h">${L==='tr'?'Son 30 gün':'Last 30 days'}</div>
    <div class="heatwrap"><div class="heatgrid">${sq}</div>
    <div class="heatleg">${lg('ok',L==='tr'?'başarılı':'all ok')} ${lg('mix',L==='tr'?'kısmi':'some fails')} ${lg('bad',L==='tr'?'başarısız':'all fail')} ${lg('none',L==='tr'?'yok':'none')}</div></div>`;
}
function drawRunner(){
  if(!runnerKey)return;
  const e=lastData[runnerKey.base]; if(!e||!e.online){closeRunner();return;}
  const host = hosts().find(h => h.base === runnerKey.base) || {base: runnerKey.base, self: !runnerKey.base};
  const r=(e.data.runners||[])[runnerKey.ri]; if(!r){closeRunner();return;}
  
  const histHash = r.status + (r.history||[]).map(x=>x.ago).join(',');
  const rBody = document.getElementById('runnerBody');
  if(rBody.dataset.histHash === histHash) {
    const aj = document.getElementById('runnerActiveJob');
    if(aj) aj.innerHTML = r.job ? jobHTML(r.job) : '';
    return;
  }
  rBody.dataset.histHash = histHash;

  const actions=r.repo?'https://github.com/'+r.repo+'/actions':'';
  const wfUrl=wf=>(r.repo&&wf)?'https://github.com/'+r.repo+'/actions/workflows/'+encodeURIComponent(wf):actions;
  let statsHTML = '';
  if(r.history && r.history.length) {
    const groups = {};
    let totRuns = 0, totOk = 0;
    for(const j of r.history) {
      if(!j.result) continue;
      const jobName = j.job || j.workflow || 'workflow';
      if(!groups[jobName]) groups[jobName] = {runs:0, ok:0, durs:[], latestDur:null};
      const g = groups[jobName];
      g.runs++; totRuns++;
      if((j.result||'').toLowerCase() === 'succeeded') { g.ok++; totOk++; }
      if(j.dur != null) { g.durs.push(j.dur); if(g.latestDur == null) g.latestDur = j.dur; }
    }
    const srCls = p => p>=90?'ok':p>=70?'warn':'bad';
    const srCol = p => p>=90?'var(--green)':p>=70?'#f5a623':'var(--red)';
    const rows = Object.entries(groups).sort((a,b)=>b[1].runs - a[1].runs).map(([name, g]) => {
      const sr = Math.round(g.ok / g.runs * 100);
      let med = '—', trend = '';
      if(g.durs.length) {
        const sorted = [...g.durs].sort((a,b)=>a-b);
        const m = sorted[Math.floor(sorted.length/2)];
        med = dur(m);
        if(g.durs.length > 1 && g.latestDur != null) {
          const diff = g.latestDur - m;
          if(diff > Math.max(10, m*0.1)) trend = ` <span class="trend up" title="${L==='tr'?'medyandan yavaş':'slower than median'}">▲</span>`;
          else if(diff < -Math.max(10, m*0.1)) trend = ` <span class="trend dn" title="${L==='tr'?'medyandan hızlı':'faster than median'}">▼</span>`;
        }
      }
      return `<div class="rm-stat">
        <span class="c-name" title="${esc(name)}">${esc(name)}</span>
        <span class="c-runs">${g.runs}</span>
        <span class="c-sr"><span class="bar"><i style="width:${sr}%;background:${srCol(sr)}"></i></span><span class="pct ${srCls(sr)}">${sr}%</span></span>
        <span class="c-med">${med}${trend}</span>
      </div>`;
    }).join('');
    if(rows) {
      const ov = totRuns ? Math.round(totOk/totRuns*100) : 0, fail = totRuns - totOk;
      statsHTML = `<div class="rm-sum">
          <div class="s"><div class="n">${totRuns}</div><div class="l">${L==='tr'?'çalışma':'runs'}</div></div>
          <div class="s"><div class="n ${srCls(ov)}">${ov}%</div><div class="l">${L==='tr'?'başarı':'success'}</div></div>
          <div class="s"><div class="n ${fail?'bad':''}">${fail}</div><div class="l">${L==='tr'?'başarısız':'failed'}</div></div>
        </div>
        <div class="rm-h">${L==='tr'?'İş istatistikleri':'Job stats'}</div>
        <div class="rm-stats">
          <div class="rm-sthead">
            <span class="c-name">${L==='tr'?'İş':'Job'}</span>
            <span class="c-runs">${L==='tr'?'Çalışma':'Runs'}</span>
            <span class="c-sr">${L==='tr'?'Başarı':'Success'}</span>
            <span class="c-med">${L==='tr'?'Medyan':'Median'}</span>
          </div>${rows}
        </div>`;
    }
  }

  const hist=(r.history&&r.history.length)?r.history.slice(0, 8).map(j=>{
    const ok=(j.result||'').toLowerCase()==='succeeded', cls=j.result?(ok?'ok':'fail'):'unk';
    const when=new Date(Date.now()-(j.ago||0)*1000).toLocaleString([],{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const brTxt=j.branch?(j.head?`${j.branch} (${j.head})`:j.branch):'';
    const headline=j.job||j.workflow||'workflow';        // the job that ran, not just its workflow
    const sub=(j.job&&j.workflow)?j.workflow:'';          // workflow kept as context
    const wfLine=sub?`<span class="rm-sub">⚙ ${esc(sub)}</span>`:'';   // workflow on its own line
    const brLine=brTxt?`<span class="rm-sub">${esc(brTxt)}</span>`:''; // PR / branch on its own line
    const tip=[headline, sub?('⚙ '+sub):'', brTxt, j.result||'?', dur(j.dur), when,
               j.actor?('👤 '+j.actor):''].filter(Boolean).join(' · ');
    return `<a class="rm-run" href="${wfUrl(j.workflow)}" target="_blank" rel="noopener" title="${esc(tip)}">
      <span class="hdot ${cls}"></span>
      <span class="rm-text"><span class="rm-job">${esc(headline)}</span>${wfLine}${brLine}</span>
      <span class="rm-meta">${j.result||'?'} · ${dur(j.dur)} · ${dur(j.ago)} ${L==='tr'?'önce':'ago'}</span>
      <span class="ext">↗</span></a>`;
  }).join(''):`<div style="color:var(--muted);font-size:13px">${L==='tr'?'geçmiş çalışma bulunamadı':'no recent runs found'}</div>`;
  document.getElementById('runnerTitle').innerHTML=`${esc(r.name)} <span class="pill ${r.status}" style="margin-left:8px"><span class="d"></span>${t.st[r.status]}</span>`;
  document.getElementById('runnerBody').innerHTML=`
    <div class="rm-repo">${esc(r.repo||'—')}</div>
    <div id="runnerActiveJob" style="margin-bottom:12px">${r.job?jobHTML(r.job):''}</div>
    ${statsHTML}
    ${heatmapHTML(e.data.jobs_summary && e.data.jobs_summary[r.dir])}
    <div id="timelineContainer" style="margin-top:16px"><div style="color:var(--muted);font-size:13px">${L==='tr'?'Zaman çizelgesi yükleniyor...':'Loading timeline...'}</div></div>
    <div class="rm-h">${L==='tr'?'Son çalışmalar':'Recent runs'}</div>
    ${hist}
    <div class="rm-links">
      ${actions?`<a href="${actions}" target="_blank" rel="noopener">${L==='tr'?'Actions sayfası':'Actions'} ↗</a>`:''}
      ${r.url?`<a href="${r.url}" target="_blank" rel="noopener">${L==='tr'?'Runner ayarları':'Runner settings'} ↗</a>`:''}
    </div>`;

  const fetchId = ++currentRunnerFetches;
  const endpoint = host.self ? '/api/jobs' : `/api/peer_jobs?key=${encodeURIComponent(host.base)}`;
  fetch(endpoint).then(res=>res.json()).then(data=>{
    if(fetchId !== currentRunnerFetches) return;
    const jobs = (data||[]).filter(x => x.runner === r.dir).slice(0, 50);
    const tc = document.getElementById('timelineContainer');
    if(!tc) return;
    if(!jobs.length) { tc.innerHTML=''; return; }
    const minTs = Math.min(...jobs.map(j => j.ts - j.dur));
    const maxTs = Math.max(...jobs.map(j => j.ts));
    const total = maxTs - minTs || 1;
    const startStr = tsFmt(minTs);
    const endStr = tsFmt(maxTs);
    let html = `<div class="rm-h">${L==='tr'?'Zaman Çizelgesi':'Timeline'}</div>
      <div style="position:relative; height:24px; background:var(--track); border-radius:4px; overflow:hidden; margin-bottom:4px;">`;
    for(const j of jobs) {
      const start = j.ts - j.dur;
      const left = (start - minTs) / total * 100;
      const width = Math.max(0.5, j.dur / total * 100);
      const color = (j.result||'').toLowerCase() === 'succeeded' ? '#39d353' : ((j.result||'').toLowerCase() === 'failed' ? 'var(--red)' : '#f5a623');
      const title = `${j.job||j.workflow} (${j.result}) - ${dur(j.dur)}`;
      html += `<div style="position:absolute; left:${left}%; width:${width}%; height:100%; background:${color}; opacity:0.8;" title="${esc(title)}"></div>`;
    }
    html += `</div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:16px;"><span>${startStr}</span><span>${endStr}</span></div>`;
    tc.innerHTML = html;
  }).catch(()=>{
    if(fetchId === currentRunnerFetches) {
      const tc = document.getElementById('timelineContainer');
      if(tc) tc.innerHTML = '';
    }
  });
}
document.getElementById('runnerClose').addEventListener('click',closeRunner);
document.getElementById('runnerModal').addEventListener('click',e=>{if(e.target.id==='runnerModal')closeRunner();});

// --- gauge chart modal ---
let chartKey=null, chartHover=null, _chartArr=[], chartRange='5m', _chartHistData=null;
const _CW=700,_CH=240,_CP=24;

async function setChartRange(rng){
  chartRange=rng;
  chartHover=null;
  if(rng==='5m'){
    _chartHistData=null;
    drawChart();
  } else {
    try {
      const [base,metric]=chartKey.split('|');
      const h = hosts().find(x => x.base === base);
      if(!h) return;
      let url = '';
      if(h.statsUrl) {
        url = new URL(h.statsUrl).origin + '/api/history?range=' + rng;
      } else {
        url = (h.base||'') + '/api/history?range=' + rng;
      }
      const r = await fetch(url);
      _chartHistData = await r.json();
      drawChart();
    } catch(e) {
      _chartHistData = null;
    }
  }
}

function openChart(k){chartKey=k;chartHover=null;chartRange='5m';_chartHistData=null;drawChart();document.getElementById('chartModal').hidden=false;}
function closeChart(){chartKey=null;chartHover=null;document.getElementById('chartModal').hidden=true;}
function drawChart(){
  if(!chartKey)return;
  const [base,metric]=chartKey.split('|');
  const e=lastData[base]; if(!e||!e.online){closeChart();return;}
  const s=e.data;
  let arr = [];
  if(chartRange === '5m'){
    arr = (s.hist&&s.hist[metric])||[];
  } else if (_chartHistData) {
    arr = _chartHistData[metric] || [];
  }
  _chartArr=arr;
  const nm=base===''?s.host:(s.host||base), label=metric==='cpu'?t.cpu:metric==='mem'?t.mem:t.diskUsed;
  const cur=arr.length?arr[arr.length-1]:0, mx=arr.length?Math.max(...arr):0, mn=arr.length?Math.min(...arr):0;
  document.getElementById('chartTitle').textContent=nm+' · '+label;
  const W=_CW,H=_CH,p=_CP;
  const xat=i=>p+i/(Math.max(1,arr.length-1))*(W-2*p);
  const yat=v=>H-p-(Math.max(0,Math.min(100,v))/100)*(H-2*p);
  const path=arr.length>1?arr.map((v,i)=>`${xat(i).toFixed(1)},${yat(v).toFixed(1)}`).join(' '):'';
  const grid=[0,25,50,75,100].map(y=>{const yy=yat(y).toFixed(1);return `<line x1="${p}" y1="${yy}" x2="${W-p}" y2="${yy}" stroke="var(--line)" stroke-dasharray="3 4" opacity=".6"/><text x="2" y="${(+yy+4)}" fill="var(--muted)" font-size="10">${y}</text>`;}).join('');
  let cross='';
  if(chartHover!=null && arr.length>1 && chartHover>=0 && chartHover<arr.length){
    const i=chartHover, v=arr[i], x=xat(i), y=yat(v);
    let ageT = '';
    if(chartRange==='5m') {
      const age=arr.length-1-i;
      ageT=age<=0?(L==='tr'?'şimdi':'now'):age+'s'+(L==='tr'?' önce':' ago');
    } else {
      const t0 = _chartHistData.t0;
      const step = _chartHistData.step;
      const t_ts = t0 + i * step;
      const d = new Date(t_ts * 1000);
      ageT = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + (chartRange!=='1h'?' '+d.toLocaleDateString([],{day:'numeric',month:'short'}):'');
    }
    const anc=x>W*0.6?'end':'start', dx=x>W*0.6?-9:9;
    cross=`<line x1="${x.toFixed(1)}" y1="${p}" x2="${x.toFixed(1)}" y2="${H-p}" stroke="var(--muted)" stroke-dasharray="3 3" opacity=".8"/>
      <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.6" fill="#4f8cff"/>
      <text x="${(x+dx).toFixed(1)}" y="${Math.max(p+12,y-9).toFixed(1)}" fill="var(--txt)" font-size="12.5" font-weight="700" text-anchor="${anc}">${v.toFixed(0)}% · ${ageT}</text>`;
  }
  const btns = ['5m', '1h', '24h', '7d'].map(r => 
    `<button class="rf ${chartRange===r?'on':''}" onclick="setChartRange('${r}')" style="padding:2px 8px;font-size:11px">${r}</button>`
  ).join('');
  document.getElementById('chartBody').innerHTML=`
    <div style="display:flex;gap:18px;color:var(--muted);font-size:13px;margin-bottom:10px;align-items:center">
      <span>${L==='tr'?'şu an':'now'}: <b style="color:var(--txt)">${cur.toFixed(0)}%</b></span>
      <span>max: <b style="color:var(--txt)">${mx.toFixed(0)}%</b></span>
      <span>min: <b style="color:var(--txt)">${mn.toFixed(0)}%</b></span>
      <div class="runfilter" style="margin:0 0 0 auto">${btns}</div>
    </div>
    <svg id="chartSvg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;cursor:crosshair">${grid}
      <polyline points="${path}" fill="none" stroke="#4f8cff" stroke-width="2" vector-effect="non-scaling-stroke"/>${cross}</svg>`;
}
document.getElementById('chartClose').addEventListener('click',closeChart);
document.getElementById('chartModal').addEventListener('click',e=>{if(e.target.id==='chartModal')closeChart();});
document.getElementById('chartBody').addEventListener('mousemove',e=>{
  const svg=document.getElementById('chartSvg'); if(!svg||_chartArr.length<2)return;
  const r=svg.getBoundingClientRect();
  const f=((e.clientX-r.left)/r.width - _CP/_CW)/((_CW-2*_CP)/_CW);
  const idx=Math.round(Math.max(0,Math.min(1,f))*(_chartArr.length-1));
  if(idx!==chartHover){chartHover=idx;drawChart();}
});
document.getElementById('chartBody').addEventListener('mouseleave',()=>{if(chartHover!=null){chartHover=null;drawChart();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeChart();closeRunner();}});

// --- notifications bell ---
const bell=document.getElementById('bellBtn');
function bellState(){const on=localStorage.getItem('sysdash-notify')==='1';
  bell.textContent=on?'🔔':'🔕';
  bell.classList.toggle('active',on);
  bell.title=on?(L==='tr'?'Bildirim AÇIK (kapatmak için tıkla)':'Notifications ON (click to turn off)')
               :(L==='tr'?'Bildirim kapalı (açmak için tıkla)':'Notifications off (click to turn on)');}
bell.addEventListener('click',async()=>{
  if(!('Notification' in window)){alert(L==='tr'?'Tarayıcı bildirim desteklemiyor':'Notifications not supported');return;}
  if(localStorage.getItem('sysdash-notify')==='1'){localStorage.setItem('sysdash-notify','0');bellState();return;}
  let perm=Notification.permission; if(perm!=='granted')perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert(L==='tr'?'İzin verilmedi. Bildirim için HTTPS gerekir — ./serve.sh ile açılan https://…ts.net adresinden dene.'
                   :'Permission denied. Notifications require HTTPS — open the https://…ts.net URL from ./serve.sh.');
    bellState();return;
  }
  localStorage.setItem('sysdash-notify','1');bellState();
  try{new Notification(L==='tr'?'🔔 Bildirimler açık':'🔔 Notifications enabled',{body:L==='tr'?'Kritik kullanımda haber vereceğim.':'You\'ll be alerted on critical usage.'});}catch(_){}
});

// --- tailnet peer auto-discovery (server-side aggregated) ---
// The server probes tailnet peers and returns the reachable sysdash ones; the
// browser fetches each peer's stats through this origin's /api/peer proxy, so it
// works the same on a phone over HTTPS (no mixed content, no per-peer serve).
async function discover(){
  if(DEMO_MODE)return;
  try{
    const list=await (await fetch('/api/peers',{cache:'no-store',signal:AbortSignal.timeout(6000)})).json();
    autoPeers=(list||[]).filter(p=>p&&p.key).map(p=>({
      base:'peer:'+p.key, name:p.name||'', statsUrl:'/api/peer?key='+encodeURIComponent(p.key)}));
  }catch(_){}
}

applyLang(); applyTheme(); bellState();
setInterval(clock,1000); clock();
tick(); setInterval(tick,1000);
discover(); setInterval(discover,30000);
if('serviceWorker' in navigator && location.protocol!=='file:') navigator.serviceWorker.register('sw.js').catch(()=>{});
