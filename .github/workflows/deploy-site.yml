name: Deploy site to GitHub Pages

# Builds the Astro marketing site in site/ and deploys it to GitHub Pages.
# (The dashboard app itself has no build step — this workflow only touches site/.)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
      # the site bundles the live app into /demo/ at build time (copy-app.mjs),
      # so a change to these should redeploy the site too
      - 'index.html'
      - 'sw.js'
      - 'manifest.webmanifest'
      - 'icon.svg'
      - 'icon-*.png'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
