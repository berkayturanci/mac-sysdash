name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please **do not** report
        security issues here — follow [SECURITY.md](../blob/main/SECURITY.md)
        instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
      placeholder: The disk gauge shows 100% but macOS Storage says 60% free…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with `SYSDASH_PORT=8799 ./venv/bin/python server.py`
        2. Open http://localhost:8799
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The `VERSION` in `server.py`, or the version badge in the header.
      placeholder: "1.33.1"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.5 (Apple Silicon)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Anything from `~/.local/log/` or the browser console. This is automatically formatted as code.
      render: shell
    validations:
      required: false
